<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obfuscate JavaScript</title>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family:'Inter',sans-serif;
        background:linear-gradient(160deg,#c2eeff 0%,#dff6ff 40%,#b8e8ff 70%,#cdf5e8 100%);
        color:#1e3a5f; min-height:100vh; padding:20px;
        overflow-x:hidden; position:relative;
    }

    /* ── Orbs ── */
    .orb { position:fixed; border-radius:50%; pointer-events:none; z-index:0; border:1.5px solid rgba(255,255,255,.6); box-shadow:inset 0 3px 12px rgba(255,255,255,.85),inset 0 -2px 6px rgba(180,220,255,.15),0 8px 40px rgba(100,180,255,.12),0 0 0 1px rgba(255,255,255,.15); overflow:hidden; will-change:transform; transform:translateZ(0); }
    .orb::before { content:''; position:absolute; top:14%; left:18%; width:28%; height:18%; background:rgba(255,255,255,.75); border-radius:50%; filter:blur(4px); }
    .orb::after  { content:''; position:absolute; bottom:16%; right:14%; width:18%; height:10%; background:rgba(255,255,255,.35); border-radius:50%; filter:blur(3px); }
    .orb-1 { width:340px;height:340px;top:-100px;left:-120px;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.65) 0%,rgba(147,210,255,.28) 45%,rgba(100,180,255,.06) 70%,transparent 100%);animation:floatOrb1 10s ease-in-out infinite; }
    .orb-2 { width:240px;height:240px;bottom:-60px;right:-70px;background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.65) 0%,rgba(160,240,200,.28) 45%,rgba(100,220,170,.06) 70%,transparent 100%);animation:floatOrb2 12s ease-in-out infinite; }
    .orb-3 { width:160px;height:160px;top:35%;right:-40px;background:radial-gradient(circle at 32% 30%,rgba(255,255,255,.65) 0%,rgba(200,180,255,.28) 45%,rgba(160,130,255,.06) 70%,transparent 100%);animation:floatOrb3 8s ease-in-out infinite; }
    .orb-4 { width:200px;height:200px;bottom:20%;left:-60px;background:radial-gradient(circle at 33% 30%,rgba(255,255,255,.65) 0%,rgba(180,220,255,.26) 45%,rgba(120,190,255,.06) 70%,transparent 100%);animation:floatOrb4 14s ease-in-out infinite; }
    @keyframes floatOrb1 { 0%,100%{transform:translate(0,0) scale(1) translateZ(0)} 33%{transform:translate(20px,28px) scale(1.04) translateZ(0)} 66%{transform:translate(-12px,14px) scale(.97) translateZ(0)} }
    @keyframes floatOrb2 { 0%,100%{transform:translate(0,0) scale(1) translateZ(0)} 40%{transform:translate(-22px,-20px) scale(1.05) translateZ(0)} 75%{transform:translate(12px,-8px) scale(.96) translateZ(0)} }
    @keyframes floatOrb3 { 0%,100%{transform:translate(0,0) scale(1) rotate(0deg) translateZ(0)} 50%{transform:translate(-16px,22px) scale(1.06) rotate(8deg) translateZ(0)} }
    @keyframes floatOrb4 { 0%,100%{transform:translate(0,0) scale(1) translateZ(0)} 35%{transform:translate(24px,-16px) scale(1.03) translateZ(0)} 70%{transform:translate(8px,20px) scale(.98) translateZ(0)} }

    /* ── Toast ── */
    .toast { position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-80px); background:rgba(15,30,55,.85); backdrop-filter:blur(16px) saturate(1.6); -webkit-backdrop-filter:blur(16px) saturate(1.6); border:1px solid rgba(255,255,255,.18); color:#fff; padding:13px 20px; border-radius:50px; font-size:14px; font-weight:600; opacity:0; transition:all .4s cubic-bezier(.34,1.56,.64,1); pointer-events:none; white-space:nowrap; z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,.18); display:flex; align-items:center; gap:9px; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast-icon { width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .toast-icon svg { width:18px; height:18px; }

    /* ── Layout ── */
    .container { max-width:1400px; margin:0 auto; display:flex; flex-direction:column; gap:20px; position:relative; z-index:1; }
    .header { text-align:center; padding:24px 0 10px; }
    .header h1 { font-size:2.5rem; font-weight:800; background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
    .header p { color:#4a7a9b; font-size:1rem; font-weight:500; }

    /* ── Glass Panel ── */
    .panel { background:rgba(255,255,255,.28); backdrop-filter:blur(20px) saturate(1.6); -webkit-backdrop-filter:blur(20px) saturate(1.6); border:1.5px solid rgba(255,255,255,.55); box-shadow:0 8px 40px rgba(100,180,255,.18),inset 0 1px 0 rgba(255,255,255,.8),inset 0 -1px 0 rgba(255,255,255,.2); border-radius:24px; padding:24px; transition:box-shadow .3s ease,transform .3s ease; }
    .panel:hover { box-shadow:0 14px 50px rgba(100,180,255,.24),inset 0 1px 0 rgba(255,255,255,.9); transform:translateY(-2px); }

    .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,.4); }
    .panel-title { display:flex; align-items:center; gap:12px; }
    .panel-title-icon { font-size:1.6rem; color:#3b82f6; background:rgba(255,255,255,.6); backdrop-filter:blur(8px); padding:8px; border-radius:12px; border:1px solid rgba(255,255,255,.7); }
    .panel-header h2 { font-size:1.3rem; font-weight:700; }
    .panel-actions { display:flex; gap:8px; flex-wrap:wrap; }

    /* ── Options ── */
    .options-section { background:rgba(255,255,255,.22); backdrop-filter:blur(20px) saturate(1.6); -webkit-backdrop-filter:blur(20px) saturate(1.6); border:1.5px solid rgba(255,255,255,.5); box-shadow:0 8px 32px rgba(100,180,255,.14),inset 0 1px 0 rgba(255,255,255,.8); border-radius:24px; padding:24px; }
    .options-title { font-size:1.2rem; font-weight:700; color:#1e3a5f; margin-bottom:18px; display:flex; align-items:center; gap:10px; }
    .options-title i { font-size:1.5rem; color:#3b82f6; background:rgba(255,255,255,.6); padding:7px; border-radius:11px; border:1px solid rgba(255,255,255,.7); }
    .options-horizontal { display:flex; flex-direction:column; gap:12px; }

    .horizontal-row { display:flex; flex-wrap:wrap; gap:12px; padding:16px; background:rgba(255,255,255,.22); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-radius:18px; border:1.5px solid rgba(255,255,255,.5); box-shadow:inset 0 1px 0 rgba(255,255,255,.8); transition:all .25s ease; }
    .horizontal-row:hover { background:rgba(255,255,255,.32); transform:translateY(-1px); box-shadow:0 6px 20px rgba(100,180,255,.1),inset 0 1px 0 rgba(255,255,255,.9); }

    .option-row { flex:1; min-width:190px; max-width:290px; padding:6px 14px 6px 0; border-right:1px solid rgba(255,255,255,.4); }
    .option-row:last-child { border-right:none; padding-right:0; }

    .option-label { display:flex; align-items:center; gap:9px; font-size:.88rem; font-weight:600; color:#1e3a5f; cursor:pointer; user-select:none; padding:3px 0; transition:all .2s ease; -webkit-tap-highlight-color:transparent; }
    .option-label:hover, .option-label.is-pressed { color:#3b82f6; transform:translateX(4px); }
    .option-label i { font-size:1rem; color:#3b82f6; background:rgba(255,255,255,.55); backdrop-filter:blur(6px); padding:5px; border-radius:8px; min-width:26px; text-align:center; border:1px solid rgba(255,255,255,.65); transition:all .2s ease; }
    .option-label:hover i, .option-label.is-pressed i { background:rgba(59,130,246,.15); transform:scale(1.1); }

    .option-control { display:flex; align-items:center; margin-top:5px; }

    /* ── Buttons ── */
    .btn-small { display:flex; align-items:center; gap:7px; padding:9px 15px; font-size:.88rem; font-weight:600; border-radius:12px; cursor:pointer; transition:all .25s cubic-bezier(.34,1.56,.64,1); background:rgba(255,255,255,.45); backdrop-filter:blur(8px); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.65); box-shadow:0 4px 12px rgba(100,180,255,.12),inset 0 1px 0 rgba(255,255,255,.8); font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent; }
    .btn-small:hover, .btn-small.is-pressed { background:rgba(255,255,255,.68); transform:translateY(-2px); box-shadow:0 8px 20px rgba(100,180,255,.2),inset 0 1px 0 rgba(255,255,255,.95); }

    .code-editor { width:100%; min-height:180px; max-height:400px; background:rgba(255,255,255,.35); backdrop-filter:blur(8px); border:1.5px solid rgba(255,255,255,.65); border-radius:16px; padding:18px; font-family:'Fira Code','Courier New',monospace; font-size:14px; color:#1e3a5f; resize:vertical; line-height:1.6; transition:all .3s ease; box-shadow:inset 0 2px 6px rgba(255,255,255,.5); outline:none; }
    .code-editor:focus { background:rgba(255,255,255,.55); border-color:rgba(59,130,246,.45); box-shadow:0 0 0 3px rgba(59,130,246,.15),inset 0 2px 6px rgba(255,255,255,.6); transform:translateY(-1px); }
    .code-editor::placeholder { color:#7da3c0; }

    select { background:rgba(255,255,255,.45); backdrop-filter:blur(8px); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.65); border-radius:12px; padding:8px 12px; font-size:.88rem; font-weight:500; min-width:130px; cursor:pointer; transition:all .25s ease; box-shadow:inset 0 1px 0 rgba(255,255,255,.7); font-family:'Inter',sans-serif; outline:none; }
    select:focus { background:rgba(255,255,255,.65); border-color:rgba(59,130,246,.45); box-shadow:0 0 0 3px rgba(59,130,246,.15); transform:translateY(-1px); }

    .checkbox { position:relative; width:50px; height:26px; background:rgba(255,255,255,.4); backdrop-filter:blur(8px); border:1.5px solid rgba(255,255,255,.65); border-radius:13px; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); box-shadow:inset 0 2px 4px rgba(0,0,0,.06); flex-shrink:0; -webkit-tap-highlight-color:transparent; }
    .checkbox.checked { background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%); border-color:rgba(59,130,246,.5); box-shadow:0 4px 12px rgba(59,130,246,.3); }
    .checkbox::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:white; border-radius:50%; transition:transform .3s cubic-bezier(.34,1.56,.64,1); box-shadow:0 2px 8px rgba(0,0,0,.15); }
    .checkbox.checked::after { transform:translateX(24px); }

    input[type="text"] { background:rgba(255,255,255,.45); backdrop-filter:blur(8px); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.65); border-radius:12px; padding:8px 12px; font-size:.88rem; width:100%; transition:all .25s ease; box-shadow:inset 0 1px 0 rgba(255,255,255,.7); font-family:'Inter',sans-serif; outline:none; }
    input[type="text"]:focus { background:rgba(255,255,255,.65); border-color:rgba(59,130,246,.45); box-shadow:0 0 0 3px rgba(59,130,246,.15); transform:translateY(-1px); }
    input[type="text"]::placeholder { color:#7da3c0; }

    .actions { display:flex; justify-content:center; gap:16px; }
    .btn { display:flex; align-items:center; gap:10px; padding:15px 32px; font-size:1.05rem; font-weight:700; border-radius:18px; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); min-width:180px; justify-content:center; font-family:'Inter',sans-serif; letter-spacing:.3px; -webkit-tap-highlight-color:transparent; }
    .btn-primary { background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(210,240,255,.85) 100%); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.8); box-shadow:0 8px 24px rgba(59,130,246,.15),inset 0 1px 0 rgba(255,255,255,.95); }
    .btn-primary:hover, .btn-primary.is-pressed { transform:translateY(-3px) scale(1.02); box-shadow:0 14px 36px rgba(59,130,246,.22),inset 0 1px 0 rgba(255,255,255,1); }
    .btn-secondary { background:linear-gradient(135deg,rgba(255,255,255,.85) 0%,rgba(240,245,255,.8) 100%); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.75); box-shadow:0 8px 24px rgba(100,120,200,.12),inset 0 1px 0 rgba(255,255,255,.9); }
    .btn-secondary:hover, .btn-secondary.is-pressed { transform:translateY(-3px) scale(1.02); box-shadow:0 14px 36px rgba(100,120,200,.18); }
    .btn:active { transform:translateY(-1px) scale(.99) !important; }
    .btn i { font-size:1.2rem; }
    .btn:disabled { opacity:.6; cursor:not-allowed; transform:none !important; }

    /* ── Stats ── */
    .stats-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .stat { display:flex; align-items:center; gap:7px; color:#1e3a5f; font-size:.82rem; font-weight:600; padding:6px 12px; background:rgba(255,255,255,.42); backdrop-filter:blur(8px); border-radius:11px; border:1.5px solid rgba(255,255,255,.65); box-shadow:inset 0 1px 0 rgba(255,255,255,.8); transition:all .2s ease; white-space:nowrap; }
    .stat:hover { background:rgba(255,255,255,.6); transform:translateY(-1px); }
    .stat i { color:#3b82f6; font-size:.95rem; }
    .stat.ratio-good i { color:#10b981; }

    .output-info { display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding:14px 18px; background:rgba(255,255,255,.22); backdrop-filter:blur(12px); border-radius:16px; border:1.5px solid rgba(255,255,255,.5); box-shadow:inset 0 1px 0 rgba(255,255,255,.8); flex-wrap:wrap; gap:12px; }
    .stats { display:flex; gap:8px; flex-wrap:wrap; }

    .output-buttons { display:flex; gap:10px; }
    .btn-copy, .btn-download { display:flex; align-items:center; gap:8px; padding:10px 18px; font-weight:600; font-size:.88rem; border-radius:14px; cursor:pointer; transition:all .25s cubic-bezier(.34,1.56,.64,1); min-width:120px; justify-content:center; font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent; }
    .btn-copy { background:linear-gradient(135deg,rgba(255,255,255,.88) 0%,rgba(220,240,255,.82) 100%); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.8); box-shadow:0 4px 14px rgba(59,130,246,.12),inset 0 1px 0 rgba(255,255,255,.95); }
    .btn-copy:hover, .btn-copy.is-pressed { transform:translateY(-2px); box-shadow:0 8px 22px rgba(59,130,246,.18); }
    .btn-download { background:linear-gradient(135deg,rgba(255,255,255,.88) 0%,rgba(230,220,255,.82) 100%); color:#1e3a5f; border:1.5px solid rgba(255,255,255,.8); box-shadow:0 4px 14px rgba(139,92,246,.12),inset 0 1px 0 rgba(255,255,255,.95); }
    .btn-download:hover, .btn-download.is-pressed { transform:translateY(-2px); box-shadow:0 8px 22px rgba(139,92,246,.18); }

    .loading { display:none; text-align:center; padding:22px; color:#3b82f6; font-size:1rem; font-weight:600; background:rgba(255,255,255,.28); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:20px; border:1.5px solid rgba(255,255,255,.5); box-shadow:0 8px 32px rgba(100,180,255,.14); }
    .loading i { animation:spin 1s linear infinite; margin-right:10px; font-size:1.3rem; }

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .shake { animation:shake .4s ease; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:rgba(255,255,255,.2); border-radius:10px; }
    ::-webkit-scrollbar-thumb { background:rgba(59,130,246,.35); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(59,130,246,.55); }

    @media(max-width:768px) {
        .header h1 { font-size:2rem; }
        .horizontal-row { flex-direction:column; gap:10px; }
        .option-row { min-width:100%; max-width:100%; border-right:none; border-bottom:1px solid rgba(255,255,255,.35); padding-right:0; padding-bottom:12px; }
        .option-row:last-child { border-bottom:none; padding-bottom:0; }
        .panel-header { flex-direction:column; align-items:flex-start; gap:12px; }
        .panel-actions { width:100%; }
        .output-info { flex-direction:column; align-items:stretch; }
        .output-buttons { width:100%; }
        .actions { flex-direction:column; align-items:center; }
        .btn { width:100%; max-width:320px; }
    }
    @media(max-width:480px) {
        body { padding:12px; }
        .panel, .options-section { padding:16px; border-radius:20px; }
    }
</style>

</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<div class="toast" id="toast">
    <div class="toast-icon" id="toastIcon"></div>
    <span id="toastMsg"></span>
</div>

<div class="container">
    <div class="header">
        <h1>Obfuscate JavaScript</h1>
        <p>Mã hóa &amp; bảo vệ code JavaScript của bạn</p>
    </div>

<div style="display:flex;flex-direction:column;gap:20px;">

    <!-- Input -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <i class='bx bx-code-alt panel-title-icon'></i>
                <h2>JavaScript Cần Mã Hóa</h2>
            </div>
            <div class="panel-actions">
                <button class="btn-small" id="pasteBtn"><i class='bx bx-paste'></i> Dán</button>
                <button class="btn-small" id="clearInputBtn"><i class='bx bx-trash'></i> Xoá</button>
            </div>
        </div>
        <textarea class="code-editor" id="inputCode" placeholder="Dán code JavaScript vào đây..."></textarea>
        <div class="stats-row">
            <div class="stat" id="inputCharCount"><i class='bx bx-font'></i><span>Ký tự: 0</span></div>
            <div class="stat" id="inputLineCount"><i class='bx bx-text'></i><span>Dòng: 0</span></div>
            <div class="stat" id="inputSizeInfo"><i class='bx bx-data'></i><span>Kích thước: 0KB</span></div>
        </div>
    </div>

    <!-- Options -->
    <div class="options-section">
        <div class="options-title">
            <i class='bx bx-cog'></i>
            <span>Obfuscation Options</span>
        </div>
        <div class="options-horizontal">
            <div class="horizontal-row" id="basicOptions"></div>
            <div class="horizontal-row" id="mainOptions"></div>
            <div class="horizontal-row" id="lockOptions"></div>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-primary" id="obfuscateBtn">
            <i class='bx bx-lock-alt'></i> Obfuscate
        </button>
        <button class="btn btn-secondary" id="resetBtn">
            <i class='bx bx-reset'></i> Đặt Lại
        </button>
    </div>

    <div class="loading" id="loading">
        <i class='bx bx-loader-circle'></i> Đang xử lý mã hóa...
    </div>

    <!-- Output -->
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <i class='bx bx-check-shield panel-title-icon'></i>
                <h2>Kết Quả Mã Hóa</h2>
            </div>
        </div>
        <textarea class="code-editor" id="outputCode" readonly placeholder="Code đã mã hóa sẽ hiện ở đây..." style="height:220px;"></textarea>
        <div class="output-info">
            <div class="stats">
                <div class="stat" id="charCount"><i class='bx bx-font'></i><span>Ký tự: 0</span></div>
                <div class="stat" id="lineCount"><i class='bx bx-text'></i><span>Dòng: 0</span></div>
                <div class="stat" id="sizeInfo"><i class='bx bx-data'></i><span>Kích thước: 0KB</span></div>
                <div class="stat" id="ratioInfo"><i class='bx bx-trending-up'></i><span>Tỉ lệ: —</span></div>
            </div>
            <div class="output-buttons">
                <button class="btn-download" id="downloadBtn"><i class='bx bx-download'></i> Tải Xuống</button>
                <button class="btn-copy" id="copyBtn"><i class='bx bx-copy'></i> Sao Chép</button>
            </div>
        </div>
    </div>
</div>

</div>

<script>
const API_URL = "https://api-obfuscation.vercel.app/javascript/obfuscate";

const ICONS = {
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#4ade80"><circle cx="12" cy="12" r="10"/><polyline points="8,12 11,15 16,9"/></svg>`,
    error:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#f87171"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#fbbf24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#60a5fa"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
};

let toastTimer;
function showToast(msg, type = 'info') {
    const el = document.getElementById('toast');
    document.getElementById('toastIcon').innerHTML = ICONS[type] || ICONS.info;
    document.getElementById('toastMsg').textContent = msg;
    el.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function shake(el) { el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); }

const optionsConfig = {
    basic: [
        { id:"target", type:"select", label:"Target", icon:"bx bx-globe",      options:["browser","node"],       default:"browser" },
        { id:"preset", type:"select", label:"Preset", icon:"bx bx-slider-alt", options:["low","medium","high"],  default:"medium"  }
    ],
    main: [
        { id:"stringEncoding",           type:"checkbox", label:"String Encoding",            icon:"bx bx-hash",          default:true  },
        { id:"stringConcealing",         type:"checkbox", label:"String Concealing",          icon:"bx bx-hide",          default:false },
        { id:"stringCompression",        type:"checkbox", label:"String Compression",         icon:"bx bx-compress",      default:false },
        { id:"stringSplitting",          type:"checkbox", label:"String Splitting",           icon:"bx bx-cut",           default:false },
        { id:"renameVariables",          type:"checkbox", label:"Rename Variables",           icon:"bx bx-rename",        default:true  },
        { id:"renameGlobals",            type:"checkbox", label:"Rename Globals",             icon:"bx bx-world",         default:false },
        { id:"movedDeclarations",        type:"checkbox", label:"Moved Declarations",         icon:"bx bx-move",          default:false },
        { id:"controlFlowFlattening",    type:"checkbox", label:"Control Flow Flattening",    icon:"bx bx-layer",         default:false },
        { id:"dispatcher",               type:"checkbox", label:"Dispatcher",                 icon:"bx bx-network-chart", default:false },
        { id:"opaquePredicates",         type:"checkbox", label:"Opaque Predicates",          icon:"bx bx-question-mark", default:false },
        { id:"deadCode",                 type:"checkbox", label:"Dead Code",                  icon:"bx bx-x-circle",      default:false },
        { id:"calculator",               type:"checkbox", label:"Calculator",                 icon:"bx bx-calculator",    default:false },
        { id:"integrity",                type:"checkbox", label:"Integrity",                  icon:"bx bx-check-shield",  default:false },
        { id:"selfDefending",            type:"checkbox", label:"Self Defending",             icon:"bx bx-shield",        default:true  },
        { id:"antiDebug",                type:"checkbox", label:"Anti Debug",                 icon:"bx bx-bug",           default:false },
        { id:"duplicateLiteralsRemoval", type:"checkbox", label:"Duplicate Literals Removal", icon:"bx bx-trash",         default:false },
        { id:"shuffle",                  type:"checkbox", label:"Shuffle",                    icon:"bx bx-shuffle",       default:false },
        { id:"stack",                    type:"checkbox", label:"Stack",                      icon:"bx bx-layer",         default:false }
    ],
    locks: [
        { id:"domainLock",  type:"text", label:"Domain Lock",  icon:"bx bx-link",    placeholder:"e.g., example.com",     default:"" },
        { id:"osLock",      type:"text", label:"OS Lock",      icon:"bx bx-desktop", placeholder:"e.g., Windows, Linux",  default:"" },
        { id:"browserLock", type:"text", label:"Browser Lock", icon:"bx bx-globe",   placeholder:"e.g., Chrome, Firefox", default:"" }
    ]
};

const presetConfigs = {
    low:    {stringEncoding:true,stringConcealing:false,stringCompression:false,stringSplitting:false,renameVariables:true,renameGlobals:false,movedDeclarations:false,controlFlowFlattening:false,dispatcher:false,opaquePredicates:false,deadCode:false,calculator:false,integrity:false,selfDefending:true,antiDebug:false,duplicateLiteralsRemoval:false,shuffle:false,stack:false},
    medium: {stringEncoding:true,stringConcealing:false,stringCompression:true,stringSplitting:false,renameVariables:true,renameGlobals:false,movedDeclarations:false,controlFlowFlattening:true,dispatcher:false,opaquePredicates:false,deadCode:false,calculator:false,integrity:false,selfDefending:true,antiDebug:true,duplicateLiteralsRemoval:false,shuffle:false,stack:false},
    high:   {stringEncoding:true,stringConcealing:true,stringCompression:true,stringSplitting:true,renameVariables:true,renameGlobals:true,movedDeclarations:true,controlFlowFlattening:true,dispatcher:true,opaquePredicates:false,deadCode:true,calculator:false,integrity:false,selfDefending:true,antiDebug:true,duplicateLiteralsRemoval:true,shuffle:true,stack:true}
};

const inputCode    = document.getElementById('inputCode');
const outputCode   = document.getElementById('outputCode');
const obfuscateBtn = document.getElementById('obfuscateBtn');
const loading      = document.getElementById('loading');

function updateInputInfo() {
    const t = inputCode.value;
    document.getElementById('inputCharCount').querySelector('span').textContent = `Ký tự: ${t.length}`;
    document.getElementById('inputLineCount').querySelector('span').textContent = `Dòng: ${t ? t.split('\n').length : 0}`;
    document.getElementById('inputSizeInfo').querySelector('span').textContent  = `Kích thước: ${(t.length/1024).toFixed(2)}KB`;
}

function updateOutputInfo() {
    const t = outputCode.value, inLen = inputCode.value.length, outLen = t.length;
    document.getElementById('charCount').querySelector('span').textContent = `Ký tự: ${outLen}`;
    document.getElementById('lineCount').querySelector('span').textContent = `Dòng: ${t ? t.split('\n').length : 0}`;
    document.getElementById('sizeInfo').querySelector('span').textContent  = `Kích thước: ${(outLen/1024).toFixed(2)}KB`;
    const ratioEl = document.getElementById('ratioInfo');
    if (inLen > 0 && outLen > 0) {
        const r = ((outLen/inLen)*100).toFixed(0);
        ratioEl.querySelector('span').textContent = `Tỉ lệ: ${r}%`;
        ratioEl.className = `stat ${outLen <= inLen*2 ? 'ratio-good' : ''}`;
    } else {
        ratioEl.querySelector('span').textContent = 'Tỉ lệ: —';
        ratioEl.className = 'stat';
    }
}

// Thêm touch support cho btn-small
function addTouchBtn(el) {
    let tm = false;
    el.addEventListener('touchstart', () => { tm=false; el.classList.add('is-pressed'); }, {passive:true});
    el.addEventListener('touchmove',  () => { tm=true; el.classList.remove('is-pressed'); }, {passive:true});
    el.addEventListener('touchend',   () => { el.classList.remove('is-pressed'); });
    el.addEventListener('touchcancel',() => { el.classList.remove('is-pressed'); });
}

function createOptionRow(option) {
    const row = document.createElement('div'); row.className = 'option-row';
    const label = document.createElement('label'); label.className = 'option-label'; label.htmlFor = option.id;
    label.innerHTML = `<i class="${option.icon}"></i>${option.label}`;
    const control = document.createElement('div'); control.className = 'option-control';

    if (option.type === 'select') {
        const sel = document.createElement('select'); sel.id = option.id;
        option.options.forEach(opt => {
            const el = document.createElement('option'); el.value = opt; el.textContent = opt;
            if (opt === option.default) el.selected = true;
            sel.appendChild(el);
        });
        control.appendChild(sel);
    } else if (option.type === 'checkbox') {
        const cb = document.createElement('div');
        cb.className = `checkbox ${option.default ? 'checked' : ''}`; cb.id = option.id;
        cb.addEventListener('click', () => cb.classList.toggle('checked'));
        label.addEventListener('click', e => { e.preventDefault(); cb.classList.toggle('checked'); });
        // touch
        let tm = false;
        cb.addEventListener('touchstart', () => { tm=false; }, {passive:true});
        cb.addEventListener('touchmove',  () => { tm=true;  }, {passive:true});
        cb.addEventListener('touchend',   e  => { if (!tm) { e.preventDefault(); cb.classList.toggle('checked'); } });
        control.appendChild(cb);
    } else if (option.type === 'text') {
        const inp = document.createElement('input'); inp.type='text'; inp.id=option.id;
        inp.placeholder=option.placeholder||''; inp.value=option.default||'';
        control.appendChild(inp);
    }

    // label touch press
    let lm = false;
    label.addEventListener('touchstart', () => { lm=false; label.classList.add('is-pressed'); }, {passive:true});
    label.addEventListener('touchmove',  () => { lm=true; label.classList.remove('is-pressed'); }, {passive:true});
    label.addEventListener('touchend',   () => { label.classList.remove('is-pressed'); });

    row.appendChild(label); row.appendChild(control); return row;
}

function createOptions() {
    optionsConfig.basic.forEach(o => document.getElementById('basicOptions').appendChild(createOptionRow(o)));
    optionsConfig.main.forEach(o  => document.getElementById('mainOptions').appendChild(createOptionRow(o)));
    optionsConfig.locks.forEach(o => document.getElementById('lockOptions').appendChild(createOptionRow(o)));
    const ps = document.getElementById('preset');
    if (ps) ps.addEventListener('change', applyPreset);
}

function applyPreset() {
    const preset = document.getElementById('preset')?.value;
    const config = presetConfigs[preset]; if (!config) return;
    for (const [id, val] of Object.entries(config)) {
        const cb = document.getElementById(id); if (cb) cb.classList.toggle('checked', val);
    }
    showToast(`Đã áp dụng preset: ${preset}`, 'info');
}

function getOptions() {
    const opts = { code: inputCode.value.trim() };
    optionsConfig.basic.forEach(o => { if (o.type==='select') opts[o.id] = document.getElementById(o.id).value; });
    optionsConfig.main.forEach(o  => { if (o.type==='checkbox') opts[o.id] = document.getElementById(o.id).classList.contains('checked'); });
    optionsConfig.locks.forEach(o => { if (o.type==='text') { const v=document.getElementById(o.id).value.trim(); if(v) opts[o.id]=v.split(',').map(s=>s.trim()).filter(Boolean); } });
    return opts;
}

async function obfuscate() {
    const opts = getOptions();
    if (!opts.code) { shake(inputCode); showToast('Vui lòng nhập mã JavaScript!', 'warning'); return; }
    loading.style.display = 'block';
    obfuscateBtn.disabled = true;
    obfuscateBtn.innerHTML = '<i class="bx bx-loader-circle" style="animation:spin 1s linear infinite;display:inline-block"></i> Đang xử lý...';
    try {
        const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(opts) });
        if (res.ok) {
            outputCode.value = await res.text();
            updateOutputInfo();
            showToast('Mã hóa thành công! 🎉', 'success');
        } else {
            showToast(`Lỗi ${res.status}: ${await res.text()}`, 'error');
        }
    } catch(err) {
        showToast(`Lỗi mạng: ${err.message}`, 'error');
    } finally {
        loading.style.display = 'none';
        obfuscateBtn.disabled = false;
        obfuscateBtn.innerHTML = '<i class="bx bx-lock-alt"></i> Obfuscate';
    }
}

async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        if (text) { inputCode.value = text; updateInputInfo(); showToast('Đã dán code từ clipboard!', 'success'); }
    } catch {
        inputCode.focus(); showToast('Hãy dán thủ công (Ctrl+V)', 'warning');
    }
}

async function copyOutput() {
    if (!outputCode.value.trim()) { showToast('Không có dữ liệu để sao chép!', 'warning'); return; }
    try {
        await navigator.clipboard.writeText(outputCode.value);
        showToast('Đã sao chép vào clipboard!', 'success');
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerHTML = '<i class="bx bx-check"></i> Đã sao chép';
        setTimeout(() => { copyBtn.innerHTML = '<i class="bx bx-copy"></i> Sao Chép'; }, 2000);
    } catch {
        outputCode.select();
        document.execCommand('copy');
        showToast('Đã sao chép!', 'success');
    }
}

function downloadOutput() {
    if (!outputCode.value.trim()) { showToast('Không có dữ liệu để tải xuống!', 'warning'); return; }
    const blob = new Blob([outputCode.value], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='obfuscated-code.js';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('Đã tải xuống thành công!', 'success');
}

function resetAll() {
    inputCode.value = ''; outputCode.value = '';
    updateInputInfo(); updateOutputInfo();
    showToast('Đã xóa tất cả', 'info');
}

function init() {
    createOptions();
    setTimeout(applyPreset, 100);
    updateInputInfo(); updateOutputInfo();

    obfuscateBtn.addEventListener('click', obfuscate);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('copyBtn').addEventListener('click', copyOutput);
    document.getElementById('downloadBtn').addEventListener('click', downloadOutput);
    document.getElementById('pasteBtn').addEventListener('click', pasteFromClipboard);
    document.getElementById('clearInputBtn').addEventListener('click', () => { inputCode.value=''; updateInputInfo(); showToast('Đã xoá code input', 'info'); });
    inputCode.addEventListener('input', updateInputInfo);
    outputCode.addEventListener('input', updateOutputInfo);
    inputCode.addEventListener('keydown', e => { if (e.ctrlKey && e.key==='Enter') { e.preventDefault(); obfuscate(); } });

    // Touch cho tất cả buttons
    document.querySelectorAll('.btn, .btn-small, .btn-copy, .btn-download').forEach(addTouchBtn);
}

document.addEventListener('DOMContentLoaded', init);
</script>
