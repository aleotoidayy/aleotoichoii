<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Resource Parser Cleaner</title>
    <style>
        body { background:#0f0f0f; color:#0f0; font-family:system-ui; padding:20px; }
        h1 { text-align:center; color:#00ff9d; }
        textarea { width:100%; height:380px; background:#1a1a1a; color:#0f0; border:1px solid #333; border-radius:8px; padding:15px; font-family:'Courier New', monospace; font-size:14px; }
        button { background:#00ff9d; color:#000; border:none; padding:12px 20px; margin:6px 4px; border-radius:6px; font-weight:bold; cursor:pointer; }
        button:hover { background:#00cc7a; }
        .suggestions { margin:15px 0; padding:10px; background:#1f1f1f; border-radius:8px; }
    </style>
</head>
<body>
    <h1>🔥 Resource Parser Cleaner</h1>

    <button onclick="pasteFromClipboard()">📋 Dán từ Clipboard</button>
    <button onclick="processCode()">🚀 Xử lý Code</button>
    <button onclick="copyResult()">📋 Copy Kết Quả</button>
    <button onclick="clearAll()">🗑️ Xóa Tất Cả</button>

    <h3>Code gốc (dán vào đây):</h3>
    <textarea id="input" placeholder="Dán toàn bộ code rsp.md hoặc resource-parser.js vào đây..."></textarea>

    <div class="suggestions" id="suggestions" style="display:none;">
        <strong>Gợi ý xóa các phần không quan trọng:</strong><br>
        <ul id="suggestList"></ul>
        <button onclick="applySuggestions()">✅ Xóa luôn các phần gợi ý</button>
    </div>

    <h3>Kết quả sau khi xử lý:</h3>
    <textarea id="output" readonly></textarea>

    <script>
        function pasteFromClipboard() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('input').value = text;
            }).catch(() => {
                alert('Không dán được từ clipboard. Hãy copy code rồi dán thủ công vào ô trên.');
            });
        }

        function processCode() {
            let code = document.getElementById('input').value;

            // Xóa comment
            code = code.replace(/\/\*[\s\S]*?\*\//g, '').replace(/\/\/.*$/gm, '');

            // Giảm xuống dòng thừa
            code = code.replace(/\n{3,}/g, '\n\n').replace(/^\s+/gm, '').trim();

            document.getElementById('output').value = code;

            // Gợi ý xóa phần thừa
            showSuggestions(code);
        }

        function showSuggestions(code) {
            const suggestDiv = document.getElementById('suggestions');
            const list = document.getElementById('suggestList');
            list.innerHTML = '';

            const useless = [
                { name: "Header comment dài đầu file", regex: /^\/\*\*[\s\S]*?\*\//m },
                { name: "Hướng dẫn sử dụng dài", regex: /使用说明[\s\S]*?直到出现解析器说明/m },
                { name: "Phần cảm ơn contributors", regex: /THANKS TO[\s\S]*?@[\w]+/m },
                { name: "Code debug và test", regex: /Pdbg|if\(Pcnt == 1\)|console\.log/m },
                { name: "Phần xử lý lỗi thông báo", regex: /Perror == 0[\s\S]*?bug_link/m }
            ];

            let has = false;
            useless.forEach(item => {
                if (item.regex.test(code)) {
                    const li = document.createElement('li');
                    li.textContent = `• ${item.name}`;
                    list.appendChild(li);
                    has = true;
                }
            });

            suggestDiv.style.display = has ? 'block' : 'none';
        }

        function applySuggestions() {
            let code = document.getElementById('output').value;

            code = code
                .replace(/^\/\*\*[\s\S]*?\*\//m, '')
                .replace(/使用说明[\s\S]*?直到出现解析器说明/m, '')
                .replace(/THANKS TO[\s\S]*?@[\w\s]+/m, '')
                .replace(/if\(Pdbg\)\s*\{[\s\S]*?\}/gm, '')
                .replace(/Pcnt == 1[\s\S]*?\$notify[\s\S]*?\}/gm, '')
                .trim();

            document.getElementById('output').value = code;
            document.getElementById('suggestions').style.display = 'none';
            alert('✅ Đã xóa các phần thừa!');
        }

        function copyResult() {
            let out = document.getElementById('output');
            if (out.value) {
                out.select();
                document.execCommand('copy');
                alert('✅ Đã copy kết quả!');
            }
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('suggestions').style.display = 'none';
        }
    </script>
</body>
</html>
