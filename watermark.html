<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Watermark Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@400;700&family=Roboto+Mono:wght@400;600&family=Montserrat:wght@400;700;800&family=Lora:wght@400;700&family=Oswald:wght@400;700&family=Dancing+Script:wght@400;700&family=Bebas+Neue&family=Raleway:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #7c6aff;
      --accent2: #ff6ab0;
      --text: #e8eaf0;
      --muted: #6b7280;
      --select-bg: rgba(255,255,255,0.06);
      --select-border: rgba(255,255,255,0.14);
      --select-focus-bg: rgba(124,106,255,0.12);
      --select-opt: #1c2030;
      --upload-bg: rgba(124,106,255,0.04);
      --upload-border: rgba(124,106,255,0.3);
      --pos-bg: #1c2030;
      --scrollbar: #2d3148;
      --canvas-bg1: #1c2030;
      --canvas-bg2: #151820;
      --tab-bg: transparent;
    }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 16px 60px;
  overflow-x: hidden; position: relative;
  color: var(--text);
  background: var(--bg);
}

.orb { position:fixed;border-radius:50%;pointer-events:none;z-index:0;border:1.5px solid rgba(255,255,255,0.7);box-shadow:inset 0 2px 12px rgba(255,255,255,0.85);overflow:hidden;will-change:transform;transition:opacity .4s; }
.orb::before { content:'';position:absolute;top:14%;left:18%;width:28%;height:18%;background:rgba(255,255,255,0.75);border-radius:50%;filter:blur(4px); }
.orb-1 { width:320px;height:320px;top:-80px;left:-100px;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.6) 0%,rgba(147,210,255,.25) 45%,transparent 100%);animation:floatOrb1 9s ease-in-out infinite; }
.orb-2 { width:220px;height:220px;bottom:-50px;right:-60px;background:radial-gradient(circle at 30% 28%,rgba(255,255,255,.6) 0%,rgba(160,240,200,.25) 45%,transparent 100%);animation:floatOrb2 11s ease-in-out infinite; }

@keyframes floatOrb1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,24px)} }
@keyframes floatOrb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-18px)} }

body::before {
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 35% at 15% 5%, rgba(139,120,255,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 45% 30% at 85% 90%, rgba(255,95,160,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 30% 20% at 50% 50%, rgba(139,120,255,0.04) 0%, transparent 70%);
}

.page { position:relative;z-index:1;width:100%;max-width:920px; }

header { text-align:center;margin-bottom:28px; }
header h1 {
  font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 0%,#a89fff 50%,#ff6ab0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header p { color:var(--muted);margin-top:8px;font-size:.85rem; }

.layout { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
@media(max-width:640px){ .layout { grid-template-columns:1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px; padding: 20px;
  box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 24px 48px rgba(0,0,0,0.4);
  position: relative;
}
.panel::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.panel-title { font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px; }
.panel-title i { font-size:1rem;color:var(--accent); }

.upload-zone {
  border:2px dashed var(--upload-border);border-radius:12px;
  padding:24px 16px;text-align:center;cursor:pointer;
  transition:all .25s;background:var(--upload-bg);position:relative;overflow:hidden;
}
.upload-zone:hover,.upload-zone.drag { border-color:var(--accent);background:rgba(139,120,255,.08);box-shadow:0 0 20px rgba(139,120,255,.1); }
.upload-zone input { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
.upload-zone > i { font-size:2rem;color:var(--accent);display:block;margin-bottom:6px; }
.upload-zone p { font-size:.8rem;color:var(--muted); }
.upload-zone strong { color:var(--text); }
.zone-thumb { width:100%;border-radius:8px;object-fit:contain;max-height:110px;display:none;margin-bottom:8px; }

.tabs { display:flex;gap:6px;margin-bottom:14px; }
.tab { flex:1;padding:9px;border-radius:10px;border:1px solid var(--border2);background:var(--tab-bg);color:var(--muted);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px; }
.tab.active { background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 16px rgba(139,120,255,.35); }

.ctrl { margin-bottom:13px; }
.ctrl-label { display:block;font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.3px; }

input[type=text] { width:100%;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;outline:none;transition:all .2s; }
input[type=text]:focus { border-color:var(--accent); }

.select-wrap { position:relative; }
.select-wrap > i { position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--muted);pointer-events:none; }
select {
  width:100%;padding:10px 34px 10px 12px;border-radius:10px;
  background:var(--select-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--select-border);
  color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;
  outline:none;transition:all .2s;cursor:pointer;
  -webkit-appearance:none;appearance:none;
}
select:focus { border-color:var(--accent);background:var(--select-focus-bg); }
select option { background:var(--select-opt);color:var(--text); }

.color-row { display:flex;gap:8px;align-items:center;overflow:hidden; }
input[type=color] { width:38px;height:38px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);cursor:pointer;padding:2px;flex-shrink:0; }

.range-row { display:flex;align-items:center;gap:10px; }
input[type=range] { flex:1;accent-color:var(--accent);cursor:pointer;height:4px; }
.range-val { font-size:.75rem;font-weight:700;color:var(--accent);min-width:40px;text-align:right;flex-shrink:0; }

.pos-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px; }
.pos-btn { aspect-ratio:1;border-radius:8px;border:1px solid var(--border2);background:var(--pos-bg);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--muted); }
.pos-btn:hover { border-color:var(--accent);color:var(--accent); }
.pos-btn.active { background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 12px rgba(139,120,255,.4); }

.check-row { display:flex;align-items:center;gap:8px;margin-bottom:12px; }
input[type=checkbox] { width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0; }
.check-label { font-size:.8rem;color:var(--muted); }

.canvas-wrap {
  border-radius:12px;overflow:hidden;
  background:repeating-conic-gradient(var(--canvas-bg1) 0% 25%,var(--canvas-bg2) 0% 50%) 0 0/20px 20px;
  min-height:180px;display:flex;align-items:center;justify-content:center;
}
#previewCanvas { max-width:100%;max-height:460px;display:none;border-radius:8px; }
.canvas-ph { color:var(--muted);text-align:center;padding:40px; }
.canvas-ph i { font-size:3rem;display:block;margin-bottom:8px;color:var(--accent);opacity:.3; }
.canvas-ph p { font-size:.85rem; }

.divider { height:1px;background:var(--border);margin:14px 0; }

.btn-row { display:flex;gap:8px;margin-top:14px;flex-wrap:wrap; }
.btn { padding:11px 18px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 24px rgba(139,120,255,.4); }
.btn-primary:hover { transform:translateY(-2px);box-shadow:0 8px 32px rgba(139,120,255,.55); }
.btn-outline { background:var(--surface2);color:var(--text);border:1px solid var(--border2); }
.btn-outline:hover { border-color:var(--accent);color:var(--accent); }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--scrollbar);border-radius:10px; }

  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Watermark Tool</h1>
      <p>Thêm tên hoặc logo vào ảnh</p>
    </header>

<div class="layout">
  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="panel">
      <div class="panel-title"><i class='bx bx-image'></i> Ảnh gốc</div>
      <div class="upload-zone" id="mainZone">
        <input type="file" id="mainFile" accept="image/*">
        <img class="zone-thumb" id="mainThumb">
        <i class='bx bx-cloud-upload'></i>
        <p><strong>Chọn ảnh</strong> hoặc kéo thả vào đây</p>
        <p style="font-size:.72rem;margin-top:3px">PNG · JPG · WEBP</p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><i class='bx bx-edit'></i> Watermark</div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('text',this)"><i class='bx bx-font'></i> Chữ</button>
        <button class="tab" onclick="switchTab('logo',this)"><i class='bx bx-image-add'></i> Logo</button>
      </div>

      <div id="tabText">
        <div class="ctrl"><label class="ctrl-label">Nội dung</label><input type="text" id="wmText" value="© Watermark" placeholder="Nhập nội dung.."></div>
        <div class="ctrl">
          <label class="ctrl-label">Font chữ</label>
          <div class="select-wrap">
            <select id="wmFont">
              <option value="Inter">Inter</option>
              <option value="Montserrat">Montserrat</option>
              <option value="Raleway">Raleway</option>
              <option value="Oswald">Oswald</option>
              <option value="Bebas Neue">Bebas Neue</option>
              <option value="Playfair Display">Playfair Display</option>
              <option value="Lora">Lora</option>
              <option value="Dancing Script">Dancing Script</option>
              <option value="Pacifico">Pacifico</option>
              <option value="Roboto Mono">Roboto Mono</option>
              <option value="Georgia">Georgia</option>
              <option value="Impact">Impact</option>
              <option value="Arial">Arial</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Courier New">Courier New</option>
            </select>
            <i class='bx bx-chevron-down'></i>
          </div>
        </div>
        <div class="ctrl"><label class="ctrl-label">Màu chữ</label>
          <div class="color-row">
            <input type="color" id="wmColor" value="#ffffff">
            <input type="text" id="wmColorHex" value="#ffffff" style="flex:1">
          </div>
        </div>
        <div class="ctrl"><label class="ctrl-label">Cỡ chữ</label>
          <div class="range-row"><input type="range" id="wmSize" min="10" max="200" value="36"><span class="range-val" id="wmSizeVal">36px</span></div>
        </div>
      </div>

      <div id="tabLogo" style="display:none">
        <div class="upload-zone" id="logoZone" style="padding:16px 12px">
          <input type="file" id="logoFile" accept="image/*">
          <img class="zone-thumb" id="logoThumb">
          <i class='bx bx-image-add'></i>
          <p><strong>Chọn logo</strong> watermark</p>
        </div>
        <div class="ctrl" style="margin-top:12px"><label class="ctrl-label">Kích thước (%)</label>
          <div class="range-row"><input type="range" id="logoSize" min="3" max="60" value="20"><span class="range-val" id="logoSizeVal">20%</span></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><i class='bx bx-move'></i> Vị trí & Hiệu ứng</div>
      <div class="pos-grid" id="posGrid">
        <button class="pos-btn active" data-pos="top-left"><i class='bx bx-up-arrow-alt' style="transform:rotate(-45deg)"></i></button>
        <button class="pos-btn" data-pos="top-center"><i class='bx bx-up-arrow-alt'></i></button>
        <button class="pos-btn" data-pos="top-right"><i class='bx bx-up-arrow-alt' style="transform:rotate(45deg)"></i></button>
        <button class="pos-btn" data-pos="middle-left"><i class='bx bx-left-arrow-alt'></i></button>
        <button class="pos-btn" data-pos="center"><i class='bx bx-radio-circle-marked'></i></button>
        <button class="pos-btn" data-pos="middle-right"><i class='bx bx-right-arrow-alt'></i></button>
        <button class="pos-btn" data-pos="bottom-left"><i class='bx bx-down-arrow-alt' style="transform:rotate(45deg)"></i></button>
        <button class="pos-btn" data-pos="bottom-center"><i class='bx bx-down-arrow-alt'></i></button>
        <button class="pos-btn" data-pos="bottom-right"><i class='bx bx-down-arrow-alt' style="transform:rotate(-45deg)"></i></button>
      </div>
      <div class="check-row">
        <input type="checkbox" id="wmTile">
        <span class="check-label">Lặp lại toàn ảnh (Tile)</span>
      </div>
      <div class="ctrl"><label class="ctrl-label">Độ trong suốt</label>
        <div class="range-row"><input type="range" id="wmOpacity" min="5" max="100" value="60"><span class="range-val" id="wmOpacityVal">60%</span></div>
      </div>
      <div class="ctrl"><label class="ctrl-label">Góc xoay</label>
        <div class="range-row"><input type="range" id="wmRotate" min="-90" max="90" value="-25"><span class="range-val" id="wmRotateVal">-25°</span></div>
      </div>
      <div class="ctrl"><label class="ctrl-label">Khoảng cách mép</label>
        <div class="range-row"><input type="range" id="wmPadding" min="0" max="150" value="20"><span class="range-val" id="wmPaddingVal">20px</span></div>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="panel" style="position:sticky;top:20px;">
      <div class="panel-title"><i class='bx bx-show'></i> Preview</div>
      <div class="canvas-wrap">
        <canvas id="previewCanvas"></canvas>
        <div class="canvas-ph" id="placeholder">
          <i class='bx bx-image-alt'></i>
          <p>Upload ảnh để xem preview</p>
        </div>
      </div>
      <div class="divider"></div>
      <div class="panel-title" style="margin-bottom:10px;"><i class='bx bx-export'></i> Xuất ảnh</div>
      <div class="ctrl">
        <label class="ctrl-label">Định dạng</label>
        <div class="select-wrap">
          <select id="exportFormat">
            <option value="image/png">PNG (giữ nền trong)</option>
            <option value="image/jpeg" selected>JPEG</option>
            <option value="image/webp">WebP</option>
          </select>
          <i class='bx bx-chevron-down'></i>
        </div>
      </div>
      <div class="ctrl"><label class="ctrl-label">Chất lượng</label>
        <div class="range-row"><input type="range" id="exportQuality" min="50" max="100" value="90"><span class="range-val" id="exportQualityVal">90%</span></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="downloadImage()"><i class='bx bx-download'></i> Tải xuống</button>
        <button class="btn btn-outline" id="copyBtn" onclick="copyImage()"><i class='bx bx-copy'></i> Copy</button>
      </div>
    </div>
  </div>
</div>

  </div>

  <script>
    let mainImg = null, logoImg = null, currentTab = 'text', currentPos = 'top-left';

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tabText').style.display = tab === 'text' ? 'block' : 'none';
      document.getElementById('tabLogo').style.display = tab === 'logo' ? 'block' : 'none';
      render();
    }

    document.getElementById('posGrid').addEventListener('click', e => {
      const btn = e.target.closest('.pos-btn'); if (!btn) return;
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentPos = btn.dataset.pos; render();
    });

    function loadFile(inputId, thumbId, iconSel, cb) {
      document.getElementById(inputId).addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => { cb(img); const t = document.getElementById(thumbId); t.src = ev.target.result; t.style.display = 'block'; const ic = document.querySelector(iconSel); if (ic) ic.style.display = 'none'; render(); };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    loadFile('mainFile', 'mainThumb', '#mainZone>i', img => mainImg = img);
    loadFile('logoFile', 'logoThumb', '#logoZone>i', img => logoImg = img);

    ['mainZone', 'logoZone'].forEach(id => {
      const z = document.getElementById(id); if (!z) return;
      z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag'); });
      z.addEventListener('dragleave', () => z.classList.remove('drag'));
      z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (!f) return; const i = z.querySelector('input'); const d = new DataTransfer(); d.items.add(f); i.files = d.files; i.dispatchEvent(new Event('change')); });
    });

    document.getElementById('wmColor').addEventListener('input', function () { document.getElementById('wmColorHex').value = this.value; render(); });
    document.getElementById('wmColorHex').addEventListener('input', function () { if (/^#[0-9a-fA-F]{6}$/.test(this.value)) { document.getElementById('wmColor').value = this.value; render(); } });

    [['wmSize','wmSizeVal','px'],['wmOpacity','wmOpacityVal','%'],['wmRotate','wmRotateVal','°'],
     ['wmPadding','wmPaddingVal','px'],['logoSize','logoSizeVal','%'],['exportQuality','exportQualityVal','%']
    ].forEach(([id, val, unit]) => { const el = document.getElementById(id), v = document.getElementById(val); if (el && v) el.addEventListener('input', () => { v.textContent = el.value + unit; render(); }); });

    ['wmText','wmFont','wmTile','exportFormat'].forEach(id => { const el = document.getElementById(id); if (el) { el.addEventListener('input', render); el.addEventListener('change', render); } });

    function render() {
      if (!mainImg) return;
      const canvas = document.getElementById('previewCanvas');
      document.getElementById('placeholder').style.display = 'none';
      canvas.style.display = 'block';
      canvas.width = mainImg.naturalWidth; canvas.height = mainImg.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(mainImg, 0, 0);
      const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
      const rotate = parseInt(document.getElementById('wmRotate').value) * Math.PI / 180;
      const padding = parseInt(document.getElementById('wmPadding').value);
      const tile = document.getElementById('wmTile').checked;
      const W = canvas.width, H = canvas.height;
      ctx.save(); ctx.globalAlpha = opacity;
      if (currentTab === 'text') {
        const text = document.getElementById('wmText').value || '© Watermark';
        const font = document.getElementById('wmFont').value;
        const color = document.getElementById('wmColor').value;
        const size = parseInt(document.getElementById('wmSize').value);
        ctx.font = `bold ${size}px "${font}"`; ctx.fillStyle = color; ctx.textBaseline = 'middle';
        const tw = ctx.measureText(text).width, th = size;
        if (tile) { const gx = tw + size * 2, gy = th * 3; for (let x = -gx; x < W + gx; x += gx) for (let y = -gy; y < H + gy; y += gy) { ctx.save(); ctx.translate(x + tw / 2, y + th / 2); ctx.rotate(rotate); ctx.fillText(text, -tw / 2, 0); ctx.restore(); } }
        else { const [x, y] = getPos(W, H, tw, th, padding); ctx.translate(x + tw / 2, y + th / 2); ctx.rotate(rotate); ctx.fillText(text, -tw / 2, 0); }
      } else {
        if (!logoImg) { ctx.restore(); return; }
        const pct = parseInt(document.getElementById('logoSize').value) / 100;
        const lw = W * pct, lh = logoImg.naturalHeight * (lw / logoImg.naturalWidth);
        if (tile) { const gx = lw * 2.2, gy = lh * 2.2; for (let x = -gx; x < W + gx; x += gx) for (let y = -gy; y < H + gy; y += gy) { ctx.save(); ctx.translate(x + lw / 2, y + lh / 2); ctx.rotate(rotate); ctx.drawImage(logoImg, -lw / 2, -lh / 2, lw, lh); ctx.restore(); } }
        else { const [x, y] = getPos(W, H, lw, lh, padding); ctx.translate(x + lw / 2, y + lh / 2); ctx.rotate(rotate); ctx.drawImage(logoImg, -lw / 2, -lh / 2, lw, lh); }
      }
      ctx.restore();
    }

    function getPos(cw, ch, ww, wh, pad) {
      return ({ 'top-left': [pad, pad], 'top-center': [cw / 2 - ww / 2, pad], 'top-right': [cw - ww - pad, pad], 'middle-left': [pad, ch / 2 - wh / 2], 'center': [cw / 2 - ww / 2, ch / 2 - wh / 2], 'middle-right': [cw - ww - pad, ch / 2 - wh / 2], 'bottom-left': [pad, ch - wh - pad], 'bottom-center': [cw / 2 - ww / 2, ch - wh - pad], 'bottom-right': [cw - ww - pad, ch - wh - pad] })[currentPos] || [pad, pad];
    }

    function downloadImage() {
      if (!mainImg) { alert('Chưa chọn ảnh!'); return; } render();
      const canvas = document.getElementById('previewCanvas');
      const fmt = document.getElementById('exportFormat').value;
      const q = parseInt(document.getElementById('exportQuality').value) / 100;
      const a = document.createElement('a'); a.href = canvas.toDataURL(fmt, q); a.download = `watermarked.${fmt.split('/')[1]}`; a.click();
    }

    async function copyImage() {
      if (!mainImg) { alert('Chưa chọn ảnh!'); return; } render();
      try {
        const blob = await new Promise(r => document.getElementById('previewCanvas').toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        const btn = document.getElementById('copyBtn'); const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bx bx-check"></i> Đã copy!';
        setTimeout(() => btn.innerHTML = orig, 1800);
      } catch { alert('Không copy được, dùng nút Tải xuống nha!'); }
    }

  </script>
</body>
</html>
